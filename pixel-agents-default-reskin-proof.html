<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pixel Agents default office — solarpunk reskin proof</title>
  <style>
    :root { color-scheme: dark; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #11131e; color: #f7f0d0; }
    main { width: 1600px; min-height: 900px; margin: 0 auto; padding: 42px 48px 36px; }
    header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 26px; }
    h1 { margin: 0; font-size: 26px; letter-spacing: .02em; }
    .summary { color: #9ccf75; font-size: 15px; }
    .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    figure { margin: 0; border: 2px solid #454b61; background: #181b29; box-shadow: 0 12px 0 #090b12; }
    figcaption { display: flex; justify-content: space-between; padding: 14px 16px; border-bottom: 2px solid #454b61; font-size: 15px; }
    figcaption strong { color: #ffcf62; }
    img { display: block; width: 100%; height: 562px; object-fit: cover; object-position: center; image-rendering: pixelated; }
    footer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 24px; }
    .metric { padding: 14px 16px; border: 1px solid #454b61; background: #181b29; }
    .metric b { display: block; color: #9ccf75; font-size: 22px; margin-bottom: 4px; }
    .metric span { color: #aeb3c7; font-size: 12px; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>PIXEL AGENTS DEFAULT OFFICE — SOLARPUNK RESKIN</h1>
      <div class="summary">same layout · same grid · exact-ID asset override</div>
    </header>
    <section class="compare" aria-label="Before and after comparison">
      <figure>
        <figcaption><strong>BEFORE</strong><span>upstream built-in furniture</span></figcaption>
        <img src="proofs/pixel-agents-default-reskin/live-upstream-default-v1.png" alt="Original Pixel Agents default office">
      </figure>
      <figure>
        <figcaption><strong>AFTER</strong><span>Verdant solarpunk asset pack</span></figcaption>
        <img src="proofs/pixel-agents-default-reskin/live-default-reskin-v1.png" alt="Solarpunk replacement of the same office">
      </figure>
    </section>
    <footer>
      <div class="metric"><b>21×22</b><span>unchanged grid</span></div>
      <div class="metric"><b>36</b><span>unchanged placements</span></div>
      <div class="metric"><b>25 / 25</b><span>default furniture IDs resolved</span></div>
      <div class="metric"><b>0</b><span>browser errors</span></div>
    </footer>
  </main>
</body>
</html>
