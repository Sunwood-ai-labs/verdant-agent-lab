<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verdant Pixel Agents Pack — room proof</title>
    <style>
      :root { color-scheme: dark; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #101812; color: #dfead8; }
      main { width: min(1040px, 96vw); padding: 30px; }
      header { display: flex; justify-content: space-between; align-items: end; margin-bottom: 18px; }
      h1 { margin: 0; font-size: 19px; letter-spacing: .06em; }
      p { margin: 6px 0 0; color: #90aa89; font-size: 12px; }
      .badge { border: 1px solid #5f7d56; padding: 7px 10px; color: #b8d9a8; font-size: 11px; }
      .stage { overflow: auto; padding: 24px; border: 1px solid #334b35; background: #162019; box-shadow: 0 24px 80px #0008; }
      #room { position: relative; width: 320px; height: 224px; transform-origin: top left; image-rendering: pixelated; background: #b88b57; }
      .scaled { width: 960px; height: 672px; }
      .scaled #room { transform: scale(3); }
      .tile { position: absolute; width: 16px; height: 16px; background: #b88b57; border-top: 1px solid #c99b64; border-left: 1px solid #a67949; }
      .tile.wall { background: #4a6542; border-color: #6e8b5d #2c432d #2c432d #6e8b5d; }
      .tile.path { background: #c7a16e; }
      .sprite { position: absolute; image-rendering: pixelated; object-fit: contain; }
      .grid::after { content: ''; position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(#f5ffd00e 1px, transparent 1px), linear-gradient(90deg, #f5ffd00e 1px, transparent 1px); background-size: 16px 16px; z-index: 999; }
      footer { display: flex; justify-content: space-between; margin-top: 14px; color: #71866f; font-size: 11px; }
      button { appearance: none; color: #cde7bf; background: #253629; border: 1px solid #4d684d; padding: 7px 10px; font: inherit; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div><h1>VERDANT OFFICE / 16PX CONTRACT PROOF</h1><p>Generated originals • exact manifest canvases • no characters</p></div>
        <div class="badge">20 × 14 tiles / scale 3×</div>
      </header>
      <section class="stage scaled"><div id="room" class="grid" aria-label="Pixel Agents compatible room preview"></div></section>
      <footer><span id="status">loading…</span><button id="toggle">GRID: ON</button></footer>
    </main>
    <script type="module">
      const room = document.querySelector('#room');
      const status = document.querySelector('#status');
      const layout = await fetch('./pixel-agents-pack/demo-layout.json').then(r => r.json());
      const assets = {
        DESK_FRONT: ['DESK', 48, 32],
        DESK_SIDE: ['DESK', 16, 64],
        WOODEN_CHAIR_FRONT: ['WOODEN_CHAIR', 16, 32],
        WOODEN_CHAIR_BACK: ['WOODEN_CHAIR', 16, 32],
        WOODEN_CHAIR_SIDE: ['WOODEN_CHAIR', 16, 32],
        PLANT: ['PLANT', 16, 32]
      };
      for (let row = 0; row < layout.rows; row++) for (let col = 0; col < layout.cols; col++) {
        const tile = document.createElement('div');
        tile.className = `tile ${row === 0 || col === 0 || col === layout.cols - 1 ? 'wall' : ''} ${col === 7 || col === 8 ? 'path' : ''}`;
        tile.style.left = `${col * 16}px`; tile.style.top = `${row * 16}px`; room.append(tile);
      }
      const ordered = [...layout.furniture].sort((a, b) => {
        const ah = assets[a.type][2], bh = assets[b.type][2];
        return (a.row * 16 + ah) - (b.row * 16 + bh);
      });
      await Promise.all(ordered.map(item => new Promise((resolve, reject) => {
        const [folder, width, height] = assets[item.type];
        const img = new Image(width, height);
        img.className = 'sprite'; img.alt = item.type;
        img.style.left = `${item.col * 16}px`; img.style.top = `${item.row * 16}px`;
        img.style.zIndex = `${item.row * 16 + height}`;
        img.onload = resolve; img.onerror = reject;
        img.src = `./pixel-agents-pack/assets/furniture/${folder}/${item.type}.png`;
        room.append(img);
      })));
      status.textContent = `${ordered.length} instances / 6 independent direction sprites loaded`;
      document.querySelector('#toggle').onclick = (event) => {
        const on = room.classList.toggle('grid'); event.currentTarget.textContent = `GRID: ${on ? 'ON' : 'OFF'}`;
      };
    </script>
  </body>
</html>
